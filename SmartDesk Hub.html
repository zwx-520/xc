                    projectList.innerHTML = '<div class="empty-state"><i class="fas fa-project-diagram"></i><span>暂无项目</span></div>';
                    return;
                }
                
                filteredProjects.forEach((project, index) => {
                    const statusClass = `status-${project.status}`;
                    const statusText = {
                        planning: '规划中',
                        progress: '进行中',
                        review: '审核中',
                        completed: '已完成'
                    }[project.status];
                    
                    const projectItem = document.createElement('div');
                    projectItem.className = 'project-item list-item';
                    projectItem.style.animationDelay = `${index * 0.05}s`;
                    projectItem.innerHTML = `
                        <div class="project-header">
                            <span class="project-name">${project.name}</span>
                            <span class="project-status ${statusClass}">${statusText}</span>
                        </div>
                        <div class="project-details">
                            <div class="project-detail-item">
                                <i class="fas fa-user-tie"></i> 负责人: ${project.manager}
                            </div>
                            <div class="project-detail-item">
                                <i class="fas fa-mobile-alt"></i> 适配: ${project.device}
                            </div>
                            <div class="project-detail-item">
                                <i class="fas fa-calendar-alt"></i> 截止: ${project.deadline}
                            </div>
                            <div class="project-detail-item">
                                <i class="fas fa-chart-line"></i> 进度: ${project.progress}%
                            </div>
                        </div>
                        <div class="project-progress">
                            <div class="project-progress-bar">
                                <div class="project-progress-fill" style="width: ${project.progress}%"></div>
                            </div>
                        </div>
                        <div class="project-log">
                            ${project.logs.slice(-3).map(log => `
                                <div class="project-log-entry">
                                    <i class="fas fa-history"></i>
                                    <span>[${log.time}] ${log.action}</span>
                                </div>
                            `).join('')}
                        </div>
                        <div class="project-actions">
                            <button class="project-action-btn" onclick="window.officeSystem.updateProjectProgress(${project.id}, 5)">+5%</button>
                            <button class="project-action-btn" onclick="window.officeSystem.updateProjectStatus(${project.id}, 'planning')" ${project.status === 'planning' ? 'disabled' : ''}>规划</button>
                            <button class="project-action-btn" onclick="window.officeSystem.updateProjectStatus(${project.id}, 'progress')" ${project.status === 'progress' ? 'disabled' : ''}>进行</button>
                            <button class="project-action-btn" onclick="window.officeSystem.updateProjectStatus(${project.id}, 'review')" ${project.status === 'review' ? 'disabled' : ''}>审核</button>
                            <button class="project-action-btn" onclick="window.officeSystem.updateProjectStatus(${project.id}, 'completed')" ${project.status === 'completed' ? 'disabled' : ''}>完成</button>
                            <button class="project-action-btn" onclick="window.officeSystem.addProjectLog(${project.id})" title="添加记录"><i class="fas fa-plus-circle"></i> 记录</button>
                            <button class="project-action-btn delete" onclick="window.officeSystem.deleteProject(${project.id})"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                    projectList.appendChild(projectItem);
                });
            }

            addProject(name, desc, manager, device, progress, deadline) {
                console.log(`[Project] 尝试添加项目: "${name}"`);
                if (!name.trim()) {
                    console.warn('[Project] 添加失败: 名称为空');
                    this.showToast('❌ 请输入项目名称');
                    return;
                }
                
                const newProject = {
                    id: Date.now(),
                    name: name.trim(),
                    desc: desc.trim() || "暂无描述",
                    manager: manager.trim() || "未分配",
                    device: device.trim() || "未指定",
                    status: 'planning',
                    progress: parseInt(progress) || 0,
                    deadline: deadline || this.getDefaultDeadline(),
                    logs: [{ time: new Date().toLocaleString('zh-CN'), action: "项目创建" }],
                    createdAt: new Date().toISOString()
                };
                this.projects.push(newProject);
                this.saveProjects();
                this.renderProjects();
                console.log('[Project] 项目添加成功:', newProject);
                this.showToast(`✅ 项目 "${name}" 已创建`);
            }

            getDefaultDeadline() {
                const date = new Date();
                date.setMonth(date.getMonth() + 1);
                return date.toISOString().split('T')[0];
            }

            updateProjectProgress(projectId, increment) {
                const project = this.projects.find(p => p.id === projectId);
                if (project) {
                    project.progress = Math.min(100, Math.max(0, project.progress + increment));
                    this.saveProjects();
                    this.renderProjects();
                    this.showToast(`📊 项目进度: ${project.progress}%`);
                    console.log(`[Project] 项目进度更新: ${project.name} -> ${project.progress}%`);
                }
            }

            updateProjectStatus(projectId, status) {
                const project = this.projects.find(p => p.id === projectId);
                if (project) {
                    const oldStatus = project.status;
                    project.status = status;
                    if (status === 'completed') {
                        project.progress = 100;
                    }
                    this.addProjectLogEntry(projectId, `状态变更: ${oldStatus} → ${status}`);
                    this.saveProjects();
                    this.renderProjects();
                    this.showToast(`✅ 项目状态已更新为: ${status}`);
                    console.log(`[Project] 项目状态更新: ${project.name} ${oldStatus} -> ${status}`);
                }
            }

            addProjectLog(projectId) {
                const project = this.projects.find(p => p.id === projectId);
                if (!project) return;
                
                const action = prompt('请输入操作记录:');
                if (action && action.trim()) {
                    this.addProjectLogEntry(projectId, action.trim());
                    this.saveProjects();
                    this.renderProjects();
                    this.showToast('✅ 操作记录已添加');
                }
            }

            addProjectLogEntry(projectId, action) {
                const project = this.projects.find(p => p.id === projectId);
                if (project) {
                    project.logs.unshift({
                        time: new Date().toLocaleString('zh-CN'),
                        action: action
                    });
                    if (project.logs.length > 20) {
                        project.logs = project.logs.slice(0, 20);
                    }
                }
            }

            deleteProject(projectId) {
                const project = this.projects.find(p => p.id === projectId);
                if (!project) return;
                
                if (confirm(`确定删除项目 "${project.name}" 吗？`)) {
                    this.projects = this.projects.filter(p => p.id !== projectId);
                    this.saveProjects();
                    this.renderProjects();
                    this.showToast('🗑️ 项目已删除');
                    console.log(`[Project] 项目已删除: ${project.name}`);
                }
            }

            filterProjects(filter) {
                this.currentFilter = filter;
                this.renderProjects();
            }

            // 主题系统
            initTheme() {
                console.log('[Theme] 初始化主题...');
                this.setTheme(this.settings.theme || 'light');
            }

            setTheme(theme) {
                document.documentElement.removeAttribute('data-theme');
                
                if (theme !== 'light') {
                    document.documentElement.setAttribute('data-theme', theme);
                }
                
                const themeToggle = document.getElementById('themeToggle');
                if (theme === 'night') {
                    themeToggle.innerHTML = '<i class="fas fa-moon"></i>';
                } else if (theme === 'cold-blue') {
                    themeToggle.innerHTML = '<i class="fas fa-snowflake"></i>';
                } else if (theme === 'warm-yellow') {
                    themeToggle.innerHTML = '<i class="fas fa-eye"></i>';
                } else {
                    themeToggle.innerHTML = '<i class="fas fa-sun"></i>';
                }
                
                document.querySelectorAll('.theme-option').forEach(option => {
                    option.classList.remove('active');
                    if (option.dataset.theme === theme) {
                        option.classList.add('active');
                    }
                });
                
                this.settings.theme = theme;
                this.saveAllData();
                 console.log(`[Theme] 主题已切换为: ${theme}`);
            }

            toggleThemeSelector() {
                document.getElementById('themeDropdown').classList.toggle('show');
            }

            // 事件监听
            initEventListeners() {
                // 主题切换
                document.getElementById('themeToggle').addEventListener('click', () => {
                    this.toggleThemeSelector();
                });
                
                document.querySelectorAll('.theme-option').forEach(option => {
                    option.addEventListener('click', () => {
                        this.setTheme(option.dataset.theme);
                        this.toggleThemeSelector();
                    });
                });
                
                document.addEventListener('click', (e) => {
                    if (!e.target.closest('.theme-selector')) {
                        document.getElementById('themeDropdown').classList.remove('show');
                    }
                });
                
                // 倒计时刷新
                document.getElementById('refreshTimer').addEventListener('click', () => {
                    this.updateAllTimers();
                    this.showToast('🔄 倒计时已刷新');
                });
                
                // 任务相关
                document.getElementById('addTaskBtn').addEventListener('click', () => {
                    const name = document.getElementById('taskInput').value;
                    this.addTask(name);
                });
                
                document.getElementById('taskInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const name = document.getElementById('taskInput').value;
                        this.addTask(name);
                    }
                });
                
                document.getElementById('taskList').addEventListener('click', (e) => {
                    const checkbox = e.target.closest('.item-checkbox');
                    const editBtn = e.target.closest('.item-action-btn.edit');
                    const deleteBtn = e.target.closest('.item-action-btn.delete');
                    
                    if (checkbox) {
                        this.toggleTask(parseInt(checkbox.dataset.id));
                    } else if (editBtn) {
                        this.editTask(parseInt(editBtn.dataset.id));
                    } else if (deleteBtn) {
                        this.deleteTask(parseInt(deleteBtn.dataset.id));
                    }
                });
                
                document.getElementById('addTaskQuick').addEventListener('click', () => {
                    document.getElementById('taskInput').focus();
                });
                
                // 备忘录相关
                document.getElementById('addMemoBtn').addEventListener('click', () => {
                    const text = document.getElementById('memoInput').value;
                    this.addMemo(text);
                });
                
                document.getElementById('memoInput').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const text = document.getElementById('memoInput').value;
                        this.addMemo(text);
                    }
                });
                
                document.getElementById('memoList').addEventListener('click', (e) => {
                    const checkbox = e.target.closest('.item-checkbox');
                    const editBtn = e.target.closest('.item-action-btn.edit');
                    const deleteBtn = e.target.closest('.item-action-btn.delete');
                    
                    if (checkbox) {
                        this.toggleMemo(parseInt(checkbox.dataset.id));
                    } else if (editBtn) {
                        this.editMemo(parseInt(editBtn.dataset.id));
                    } else if (deleteBtn) {
                        this.deleteMemo(parseInt(deleteBtn.dataset.id));
                    }
                });
                
                document.getElementById('clearCompletedMemo').addEventListener('click', () => {
                    this.clearCompletedMemos();
                });
                
                // 签到相关
                document.getElementById('signInBtn').addEventListener('click', () => {
                    this.signIn(false);
                });
                
                document.getElementById('signOutBtn').addEventListener('click', () => {
                    this.signOut();
                });
                
                document.getElementById('exportLogsBtn').addEventListener('click', () => {
                    this.exportLogs();
                });
                
                document.getElementById('refreshLogs').addEventListener('click', () => {
                    this.loadLogs();
                    this.showToast('🔄 日志已刷新');
                });
                
                // 目标相关
                document.getElementById('addGoalBtn').addEventListener('click', () => {
                    const name = document.getElementById('goalName').value;
                    const target = document.getElementById('goalTarget').value;
                    this.addGoal(name, target);
                });
                
                document.getElementById('goalName').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        const name = document.getElementById('goalName').value;
                        const target = document.getElementById('goalTarget').value;
                        this.addGoal(name, target);
                    }
                });
                
                document.getElementById('addGoalQuick').addEventListener('click', () => {
                    document.getElementById('goalName').focus();
                });
                
                // 项目相关
                document.querySelectorAll('.project-tab').forEach(tab => {
                    tab.addEventListener('click', () => {
                        document.querySelectorAll('.project-tab').forEach(t => t.classList.remove('active'));
                        tab.classList.add('active');
                        this.filterProjects(tab.dataset.filter);
                    });
                });
                
                document.getElementById('addProjectQuick').addEventListener('click', () => {
                    this.showProjectModal();
                });
            }

            // 模态框系统
            initModals() {
                this.modal = {
                    overlay: document.getElementById('modalOverlay'),
                    title: document.getElementById('modalTitle'),
                    body: document.getElementById('modalBody'),
                    footer: document.getElementById('modalFooter'),
                    close: document.getElementById('modalClose'),
                    cancel: document.getElementById('modalCancel'),
                    confirm: document.getElementById('modalConfirm')
                };
                
                this.modal.close.addEventListener('click', () => this.hideModal());
                this.modal.cancel.addEventListener('click', () => this.hideModal());
                this.modal.overlay.addEventListener('click', (e) => {
                    if (e.target === this.modal.overlay) {
                        this.hideModal();
                    }
                });
            }

            showModal(title, content, onConfirm) {
                this.modal.title.textContent = title;
                this.modal.body.innerHTML = content;
                this.modal.footer.style.display = onConfirm ? 'flex' : 'none';
                this.modal.overlay.classList.add('show');
                
                if (onConfirm) {
                    const handleConfirm = () => {
                        onConfirm();
                        this.hideModal();
                        this.modal.confirm.removeEventListener('click', handleConfirm);
                    };
                    this.modal.confirm.addEventListener('click', handleConfirm);
                }
            }

            hideModal() {
                this.modal.overlay.classList.remove('show');
            }

            showTaskModal() {
                const content = `
                    <div class="form-group">
                        <label class="form-label">任务名称 *</label>
                        <input type="text" class="form-input" id="modalTaskName" placeholder="输入任务名称">
                    </div>
                `;
                
                this.showModal('新建任务', content, () => {
                    const name = document.getElementById('modalTaskName').value;
                    this.addTask(name);
                });
                
                setTimeout(() => document.getElementById('modalTaskName').focus(), 100);
            }

            showGoalModal() {
                const content = `
                    <div class="form-group">
                        <label class="form-label">目标名称 *</label>
                        <input type="text" class="form-input" id="modalGoalName" placeholder="输入目标名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">目标值 (0-100)</label>
                        <input type="number" class="form-input" id="modalGoalTarget" placeholder="100" min="0" max="100" value="100">
                    </div>
                `;
                
                this.showModal('新建目标', content, () => {
                    const name = document.getElementById('modalGoalName').value;
                    const target = document.getElementById('modalGoalTarget').value;
                    this.addGoal(name, target);
                });
                
                setTimeout(() => document.getElementById('modalGoalName').focus(), 100);
            }

            showProjectModal() {
                const tomorrow = new Date();
                tomorrow.setDate(tomorrow.getDate() + 1);
                const defaultDeadline = tomorrow.toISOString().split('T')[0];
                
                const content = `
                    <div class="form-group">
                        <label class="form-label">项目名称 *</label>
                        <input type="text" class="form-input" id="modalProjectName" placeholder="输入项目名称">
                    </div>
                    <div class="form-group">
                        <label class="form-label">项目描述</label>
                        <textarea class="form-textarea" id="modalProjectDesc" rows="2" placeholder="输入项目描述"></textarea>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">负责人</label>
                            <input type="text" class="form-input" id="modalProjectManager" placeholder="项目负责人">
                        </div>
                        <div class="form-group">
                            <label class="form-label">适配机型</label>
                            <input type="text" class="form-input" id="modalProjectDevice" placeholder="如: PC/iOS/Android">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label class="form-label">初始进度 (%)</label>
                            <input type="number" class="form-input" id="modalProjectProgress" placeholder="0-100" min="0" max="100" value="0">
                        </div>
                        <div class="form-group">
                            <label class="form-label">截止日期</label>
                            <input type="date" class="form-input" id="modalProjectDeadline" value="${defaultDeadline}">
                        </div>
                    </div>
                `;
                
                this.showModal('新建项目', content, () => {
                    const name = document.getElementById('modalProjectName').value;
                    const desc = document.getElementById('modalProjectDesc').value;
                    const manager = document.getElementById('modalProjectManager').value;
                    const device = document.getElementById('modalProjectDevice').value;
                    const progress = document.getElementById('modalProjectProgress').value;
                    const deadline = document.getElementById('modalProjectDeadline').value;
                    this.addProject(name, desc, manager, device, progress, deadline);
                });
                
                setTimeout(() => document.getElementById('modalProjectName').focus(), 100);
            }

            // 分享/截图功能 - 已暂时移除
            initShareFunction() {
                // 截图功能因外部依赖问题暂时禁用
                // 待核心功能稳定后，将使用更可靠的方式重新引入
                console.log('[Share] 截图功能已暂时禁用，以避免外部依赖导致系统不稳定。');
            }

            // 工具函数
            showToast(message) {
                const toast = document.getElementById('toast');
                toast.querySelector('#toastMessage').textContent = message;
                toast.style.display = 'flex';
                toast.style.animation = 'slideIn 0.3s ease';
                
                setTimeout(() => {
                    toast.style.animation = 'slideOut 0.3s ease forwards';
                    setTimeout(() => toast.style.display = 'none', 300);
                }, 3000);
            }
        }

        // 初始化系统
        document.addEventListener('DOMContentLoaded', () => {
            window.officeSystem = new SmartOfficeProV2();
        });
    </script>
</body>
</html>
