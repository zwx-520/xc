<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StarTide NetEnv Detector</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        darkBg: '#0f172a',
                        darkCard: '#1e293b',
                        warn: '#f59e0b'
                    },
                    fontFamily: {
                        inter: ['system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        *{transition: all 0.3s ease;}
        .card-gradient{
            background: linear-gradient(135deg,#ffffff 0%,#f8fafc 100%);
        }
        .dark .card-gradient{
            background: linear-gradient(135deg,#1e293b 0%,#0f172a 100%);
        }
        .load-pulse{
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse{
            0%,100%{opacity:1;}
            50%{opacity:0.5;}
        }
        .btn-link{
            display:inline-block;
            padding:4px 12px;
            background:#3b82f6;
            color:#fff;
            border-radius:6px;
            text-decoration:none;
        }
    </style>
</head>
<body class="font-inter bg-gray-100 dark:darkBg dark:text-gray-200 min-h-screen py-8 px-4">
    <div class="max-w-5xl mx-auto">
        <!-- 头部标题 -->
        <div class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-[clamp(1.5rem,3vw,2.5rem)] font-bold text-primary flex items-center gap-2">
                    <i class="fa fa-wifi"></i> StarTide NetEnv Detector
                </h1>
                <p class="text-gray-500 dark:text-gray-400">Network & Device Environment Detection System</p>
            </div>
            <button id="themeBtn" class="p-3 rounded-full bg-white dark:darkCard shadow-md">
                <i class="fa fa-moon-o dark:fa-sun-o text-primary"></i>
            </button>
        </div>

        <!-- 按钮组 -->
        <div class="flex gap-3 mb-6">
            <button id="refreshBtn" class="px-5 py-2 bg-primary text-white rounded-lg shadow flex items-center gap-2 hover:bg-primary/90">
                <i class="fa fa-refresh"></i> Re-Detect
            </button>
            <button id="copyBtn" class="px-5 py-2 bg-white dark:darkCard rounded-lg shadow flex items-center gap-2">
                <i class="fa fa-copy"></i> Copy Info
            </button>
        </div>

        <!-- 卡片容器 -->
        <div class="grid md:grid-cols-2 gap-6">
            <!-- 设备环境卡片【已完善全部信息】 -->
            <div class="card-gradient rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fa fa-mobile text-primary text-xl"></i> Full Device Info
                </h2>
                <div id="deviceBox" class="space-y-3 text-gray-600 dark:text-gray-300">
                    <p class="load-pulse">Detecting device info...</p>
                </div>
            </div>

            <!-- 网络IP卡片 -->
            <div class="card-gradient rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700">
                <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                    <i class="fa fa-globe text-primary text-xl"></i> Network & IP Info
                </h2>
                <div id="netBox" class="space-y-3 text-gray-600 dark:text-gray-300">
                    <p class="load-pulse">Getting IP and location...</p>
                </div>
            </div>
        </div>

        <!-- UA完整信息 -->
        <div class="mt-6 card-gradient rounded-2xl p-6 shadow-lg border border-gray-200 dark:border-gray-700">
            <h2 class="text-lg font-semibold mb-4 flex items-center gap-2">
                <i class="fa fa-code text-primary"></i> UserAgent Raw Info
            </h2>
            <div id="uaBox" class="text-sm break-all text-gray-500 dark:text-gray-400"></div>
        </div>
    </div>

<script>
// 全局存储
let allInfoText = "";
let currentIP = "";

// 暗黑模式
const themeBtn = document.getElementById('themeBtn');
if(localStorage.getItem('theme')==='dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)){
    document.documentElement.classList.add('dark');
}
themeBtn.onclick = ()=>{
    document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme',document.documentElement.classList.contains('dark')?'dark':'light');
};

// 完整设备解析：类型、系统、版本、浏览器、版本
function parseFullDeviceInfo(){
    const ua = navigator.userAgent;
    const uaLower = ua.toLowerCase();
    let info = {};

    // 设备类型
    if(/ipad|android 3.0|xoom|sch-i800|playbook|tablet|kindle/.test(uaLower)){
        info.deviceType = "Tablet 平板设备";
    }else if(/iphone|ipod|android|blackberry|mini|windows ce|palm/.test(uaLower)){
        info.deviceType = "Mobile Phone 手机设备";
    }else{
        info.deviceType = "PC Computer 电脑设备";
    }

    // 系统 & 版本
    if(ua.includes("Windows NT 10")) info.os = "Windows 10";
    else if(ua.includes("Windows NT 11")) info.os = "Windows 11";
    else if(ua.includes("Mac OS")) info.os = "MacOS";
    else if(ua.includes("Android")) info.os = "Android 安卓系统";
    else if(/iphone|ios/.test(uaLower)) info.os = "iOS 苹果手机系统";
    else if(ua.includes("Linux")) info.os = "Linux 系统";
    else info.os = "Unknown 未知系统";

    // 浏览器 & 版本
    if(ua.includes("Edg")) info.browser = "Microsoft Edge 浏览器";
    else if(ua.includes("Chrome")) info.browser = "Google Chrome 谷歌浏览器";
    else if(ua.includes("Firefox")) info.browser = "Firefox 火狐浏览器";
    else if(ua.includes("Safari")) info.browser = "Safari 苹果浏览器";
    else info.browser = "Unknown 未知浏览器";

    // 屏幕分辨率
    info.screen = `${screen.width} × ${screen.height}`;
    // 可用内存（部分浏览器支持）
    info.memory = navigator.deviceMemory ? navigator.deviceMemory + " GB" : "Not Support";
    // 语言
    info.lang = navigator.language;

    return info;
}

// 网络类型
function getNetType(){
    if(!navigator.connection) return "Unavailable";
    return navigator.connection.effectiveType || "Unknown";
}

// 渲染全部
function renderAll(){
    allInfoText = "";
    const dev = parseFullDeviceInfo();
    const netType = getNetType();

    // 渲染完善设备信息
    let deviceHtml = `
    <p>Device Type: <span class="text-primary font-medium">${dev.deviceType}</span></p>
    <p>Operating System: ${dev.os}</p>
    <p>Browser: ${dev.browser}</p>
    <p>Screen Resolution: ${dev.screen}</p>
    <p>Device Memory: ${dev.memory}</p>
    <p>System Language: ${dev.lang}</p>
    `;
    document.getElementById("deviceBox").innerHTML = deviceHtml;

    // 网络基础
    let netHtml = `<p>Network Mode: ${netType}</p><p>IP Location: Loading...</p>`;
    document.getElementById("netBox").innerHTML = netHtml;

    // UA
    document.getElementById("uaBox").innerText = navigator.userAgent;

    // 拼接复制文本
    allInfoText += `【Device Info】\n设备类型: ${dev.deviceType}\n操作系统: ${dev.os}\n浏览器: ${dev.browser}\n屏幕分辨率: ${dev.screen}\n设备内存: ${dev.memory}\n系统语言: ${dev.lang}\n网络类型: ${netType}\n`;

    // 获取IP归属地，失败显示百度搜索外链
    fetch("https://ipapi.co/json/")
    .then(res=>res.json())
    .then(data=>{
        currentIP = data.ip;
        let ipHtml = `
        <p>Public IP: <span class="text-primary font-medium">${data.ip}</span></p>
        <p>Country: ${data.country_name}</p>
        <p>Region: ${data.region}</p>
        <p>City: ${data.city}</p>
        <p>ISP: ${data.org}</p>
        `;
        document.getElementById("netBox").innerHTML = `<p>Network Mode: ${netType}</p>` + ipHtml;
        allInfoText += `【IP Info】\n公网IP: ${data.ip}\n国家: ${data.country_name}\n省份: ${data.region}\n城市: ${data.city}\n运营商: ${data.org}`;
    })
    .catch(()=>{
        // 查询失败，给出百度IP搜索按钮
        document.getElementById("netBox").innerHTML = `
        <p>Network Mode: ${netType}</p>
        <p class="text-warn">IP location query failed</p>
        <a href="https://www.baidu.com/s?wd=IP%E5%9C%B0%E5%9D%80%E6%9F%A5%E8%AF%A2" target="_blank" class="btn-link mt-2 inline-block">
            <i class="fa fa-search"></i> 去百度查询IP
        </a>
        `;
    });
}

// 刷新
document.getElementById("refreshBtn").onclick = renderAll;

// 复制
document.getElementById("copyBtn").onclick = ()=>{
    navigator.clipboard.writeText(allInfoText).then(()=>{
        alert("All device & network info copied!");
    });
};

// 初始化
window.onload = renderAll;
</script>
</body>
</html>
