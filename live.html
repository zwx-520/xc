<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>科技直播导航 - 全网直播平台一键直达</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        /* 页面背景 - 科技感网格 */
        body {
            background-color: #0a0a0f;
            background-image: 
                linear-gradient(rgba(18, 18, 40, 0.8) 1px, transparent 1px),
                linear-gradient(90deg, rgba(18, 18, 40, 0.8) 1px, transparent 1px);
            background-size: 30px 30px;
            color: #fff;
            min-height: 100vh;
            padding: 20px;
        }

        /* 顶部标题区域 */
        .header {
            text-align: center;
            margin: 40px 0;
            position: relative;
        }

        .title {
            font-size: 42px;
            background: linear-gradient(90deg, #00ffff, #ff00ff, #ffff00);
            background-clip: text;
            -webkit-background-clip: text;
            color: transparent;
            animation: titleGlow 3s linear infinite;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 18px;
            color: #8888bb;
            opacity: 0.8;
        }

        /* 动画：标题发光 */
        @keyframes titleGlow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        /* 卡片容器 - 网格布局 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        /* 平台卡片 - 科技玻璃拟态效果 */
        .card {
            background: rgba(25, 25, 45, 0.7);
            border: 1px solid rgba(0, 255, 255, 0.2);
            border-radius: 15px;
            padding: 25px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
        }

        /* 卡片流动霓虹边框 */
        .card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.1), transparent);
            transition: left 0.5s;
        }

        /* 悬停效果 */
        .card:hover {
            transform: translateY(-8px) scale(1.05);
            box-shadow: 0 0 25px rgba(0, 255, 255, 0.3);
            border-color: rgba(0, 255, 255, 0.8);
        }

        .card:hover::before {
            left: 100%;
        }

        /* 平台图标 */
        .card img {
            width: 70px;
            height: 70px;
            object-fit: contain;
            margin-bottom: 15px;
            border-radius: 12px;
            transition: transform 0.3s;
        }

        .card:hover img {
            transform: rotate(5deg) scale(1.1);
        }

        /* 平台名称 */
        .card-name {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
            color: #ffffff;
        }

        /* 平台描述 */
        .card-desc {
            font-size: 13px;
            color: #a0a0c0;
        }

        /* 响应式适配 */
        @media (max-width: 768px) {
            .title {
                font-size: 28px;
            }
            .container {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 20px;
            }
            .card img {
                width: 55px;
                height: 55px;
            }
        }
    </style>
</head>

    <script>
