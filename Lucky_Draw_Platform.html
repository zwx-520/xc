<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>抽奖平台导航管理</title>
    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Microsoft YaHei", sans-serif;
        }
        body{
            background: #f5f7fa;
            padding: 30px 20px;
            max-width: 1100px;
            margin: 0 auto;
            min-height: 100vh;
        }
        .page-title{
            text-align: center;
            font-size: 26px;
            color: #2d3748;
            margin-bottom: 30px;
            font-weight: 600;
            position: relative;
        }
        .page-title::after{
            content: '';
            width: 60px;
            height: 4px;
            background: #409eff;
            border-radius: 2px;
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
        }
        .card{
            background: #fff;
            border-radius: 16px;
            padding: 28px;
            margin-bottom: 28px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.06);
        }
        .card-title{
            font-size: 18px;
            color: #2d3748;
            margin-bottom: 24px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title::before{
            content: '';
            width: 4px;
            height: 18px;
            background: #409eff;
            border-radius: 2px;
        }
        .form-group{
            margin-bottom: 20px;
        }
        .form-label{
            display: block;
            margin-bottom: 8px;
            color: #4a5568;
            font-size: 14px;
            font-weight: 500;
        }
        .form-input,
        .form-select{
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s;
            background: #fafbfc;
        }
        .form-input:focus,
        .form-select:focus{
            outline: none;
            border-color: #409eff;
            box-shadow: 0 0 0 3px rgba(64,158,255,0.15);
            background: #fff;
        }
        .btn-group{
            display: flex;
            gap: 12px;
            margin-top: 10px;
        }
        .btn{
            padding: 12px 24px;
            border-radius: 10px;
            border: none;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }
        .btn-primary{
            background: #409eff;
            color: #fff;
        }
        .btn-primary:hover{
            background: #338eef;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(64,158,255,0.25);
        }
        .btn-default{
            background: #909399;
            color: #fff;
        }
        .btn-default:hover{
            background: #82848a;
            transform: translateY(-2px);
        }
        .btn-success{
            background: #67c23a;
            color: #fff;
            padding: 8px 14px;
            font-size: 13px;
        }
        .btn-danger{
            background: #f56c6c;
            color: #fff;
            padding: 8px 14px;
            font-size: 13px;
        }
        .btn-success:hover, .btn-danger:hover{
            transform: translateY(-1px);
            opacity: 0.9;
        }
        .table{
            width: 100%;
            border-collapse: collapse;
            border-radius: 12px;
            overflow: hidden;
        }
        .table th{
            background: #f8f9fa;
            padding: 14px;
            text-align: center;
            font-weight: 600;
            color: #2d3748;
            font-size: 14px;
        }
        .table td{
            padding: 14px;
            text-align: center;
            border-bottom: 1px solid #f2f3f5;
            font-size: 14px;
            color: #4a5568;
        }
        .table tr:hover{
            background: #f8faff;
        }
        .link{
            color: #409eff;
            text-decoration: none;
            font-weight: 500;
        }
        .link:hover{
            text-decoration: underline;
        }
        .empty{
            text-align: center;
            padding: 50px 0;
            color: #909399;
            font-size: 15px;
        }
        .pagination{
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 25px;
            flex-wrap: wrap;
        }
        .page-btn{
            padding: 8px 14px;
            background: #fff;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 14px;
        }
        .page-btn:hover:not(:disabled){
            background: #409eff;
            color: #fff;
            border-color: #409eff;
        }
        .page-btn:disabled{
            opacity: 0.5;
            cursor: not-allowed;
        }
        .page-info{
            font-size: 14px;
            color: #64748b;
            padding: 0 10px;
        }
        .cate-tag{
            display: inline-block;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            background: #e6f7ff;
            color: #1890ff;
        }
    </style>
</head>
<body>

<h1 class="page-title">🎯 抽奖平台导航管理系统</h1>

<!-- 表单卡片 -->
<div class="card">
    <h3 class="card-title">添加/编辑平台信息</h3>
    <input type="hidden" id="editId">

    <div class="form-group">
        <label class="form-label">平台名称</label>
        <input type="text" class="form-input" id="name" placeholder="请输入平台名称">
    </div>

    <div class="form-group">
        <label class="form-label">平台网址</label>
        <input type="text" class="form-input" id="url" placeholder="https://">
    </div>

    <div class="form-group">
        <label class="form-label">平台分类</label>
        <select class="form-select" id="category">
            <option value="">请选择分类</option>
            <option value="网页">网页</option>
            <option value="App">App</option>
            <option value="微信小程序">微信小程序</option>
            <option value="QQ小程序">QQ小程序"</option>
            <option value="其他">其他</option>
        </select>
    </div>

    <div class="form-group">
        <label class="form-label">备注说明</label>
        <input type="text" class="form-input" id="note" placeholder="选填">
    </div>

    <div class="btn-group">
        <button class="btn btn-primary" onclick="save()">保存信息</button>
        <button class="btn btn-default" onclick="reset()">清空重置</button>
    </div>
</div>

<!-- 列表卡片 -->
<div class="card">
    <h3 class="card-title">平台列表</h3>
    <table class="table" id="table">
        <thead>
            <tr>
                <th>序号</th>
                <th>平台名称</th>
                <th>分类</th>
                <th>添加时间</th>
                <th>访问链接</th>
                <th>备注</th>
                <th>操作</th>
            </tr>
        </thead>
        <tbody id="tbody"></tbody>
    </table>
    <div id="empty" class="empty" style="display:none;">暂无数据</div>
    <div class="pagination" id="pagination"></div>
</div>

<script>
// 数据配置
let dataList = JSON.parse(localStorage.getItem('lotteryList')) || [];
let currentPage = 1;
const pageSize = 6; // 每页6条

// 保存数据
function save() {
    const id = document.getElementById('editId').value;
    const name = document.getElementById('name').value.trim();
    const url = document.getElementById('url').value.trim();
    const category = document.getElementById('category').value;
    const note = document.getElementById('note').value.trim();

    if(!name || !url || !category){
        alert('请填写完整信息！');
        return;
    }

    if(id){
        // 编辑
        const index = dataList.findIndex(item => item.id == id);
        dataList[index] = {
            ...dataList[index],
            name, url, category, note
        };
    }else{
        // 新增（自动添加时间）
        dataList.unshift({
            id: Date.now(),
            name,
            url,
            category,
            note,
            createTime: new Date().toLocaleString()
        });
    }

    localStorage.setItem('lotteryList', JSON.stringify(dataList));
    reset();
    render();
}

// 渲染列表 + 分页
function render() {
    const tbody = document.getElementById('tbody');
    const empty = document.getElementById('empty');
    const pagination = document.getElementById('pagination');
    
    tbody.innerHTML = '';
    const total = dataList.length;

    if(total === 0){
        empty.style.display = 'block';
        pagination.innerHTML = '';
        return;
    }

    empty.style.display = 'none';
    const totalPage = Math.ceil(total / pageSize);
    const start = (currentPage - 1) * pageSize;
    const end = start + pageSize;
    const showList = dataList.slice(start, end);

    showList.forEach((item, i) => {
        const tr = document.createElement('tr');
        tr.innerHTML = `
            <td>${start + i + 1}</td>
            <td>${item.name}</td>
            <td><span class="cate-tag">${item.category}</span></td>
            <td>${item.createTime || '-'}</td>
            <td><a href="${item.url}" target="_blank" class="link">打开</a></td>
            <td>${item.note || '-'}</td>
            <td>
                <button class="btn btn-success" onclick="edit(${item.id})">编辑</button>
                <button class="btn btn-danger" onclick="del(${item.id})">删除</button>
            </td>
        `;
        tbody.appendChild(tr);
    });

    // 渲染分页
    pagination.innerHTML = `
        <button class="page-btn" onclick="changePage(1)" ${currentPage===1?'disabled':''}>首页</button>
        <button class="page-btn" onclick="changePage(${currentPage-1})" ${currentPage===1?'disabled':''}>上一页</button>
        <span class="page-info">第 ${currentPage} / ${totalPage} 页</span>
        <button class="page-btn" onclick="changePage(${currentPage+1})" ${currentPage===totalPage?'disabled':''}>下一页</button>
        <button class="page-btn" onclick="changePage(${totalPage})" ${currentPage===totalPage?'disabled':''}>尾页</button>
    `;
}

// 切换页码
function changePage(page) {
    currentPage = page;
    render();
}

// 编辑
function edit(id) {
    const item = dataList.find(item => item.id == id);
    document.getElementById('editId').value = item.id;
    document.getElementById('name').value = item.name;
    document.getElementById('url').value = item.url;
    document.getElementById('category').value = item.category;
    document.getElementById('note').value = item.note;
}

// 删除
function del(id) {
    if(!confirm('确定删除？')) return;
    dataList = dataList.filter(item => item.id != id);
    localStorage.setItem('lotteryList', JSON.stringify(dataList));
    render();
}

// 重置表单
function reset() {
    document.getElementById('editId').value = '';
    document.getElementById('name').value = '';
    document.getElementById('url').value = '';
    document.getElementById('category').value = '';
    document.getElementById('note').value = '';
}

// 初始化
render();
</script>
</body>
</html>
